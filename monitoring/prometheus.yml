global:
  scrape_interval: 15s
  evaluation_interval: 15s

# Load alert rules
rule_files:
  - "alert_rules.yml"

# Alertmanager connection
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:

  # ─── Prometheus itself ─────────────────────────────────────────
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # ─── Your Node.js App metrics ─────────────────────────────────
  - job_name: 'task-manager-app'
    static_configs:
      - targets: ['app:3000']
    metrics_path: '/metrics'

  # ─── System metrics via Node Exporter ─────────────────────────
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
