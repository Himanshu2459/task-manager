global:
  resolve_timeout: 5m
  # Get this from: Slack → Apps → Incoming Webhooks
  slack_api_url: "https://hooks.slack.com/services/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"    # ← Replace this

route:
  group_by: ['alertname']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 3h
  receiver: 'slack-alerts'

receivers:
  - name: 'slack-alerts'
    slack_configs:
      - channel: '#alerts'                   # ← Your Slack channel
        username: 'AlertManager'
        icon_emoji: ':rotating_light:'
        title: '[{{ .Status | toUpper }}] {{ .CommonAnnotations.summary }}'
        text: '{{ .CommonAnnotations.description }}'
        send_resolved: true
